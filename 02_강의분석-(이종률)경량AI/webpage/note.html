<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 모델 경량화 — 강의 노트</title>
<style>
/* ============ 디자인 토큰 (01 Data-Centric AI 노트 계승: 다크 종이 질감) ============ */
:root{
  --ink:#0b0e13;        /* 페이지 배경 */
  --panel:#12161e;      /* 패널 배경 */
  --panel-2:#171c26;    /* 밝은 단계 패널 */
  --line:#252c3a;       /* 경계선 */
  --paper:#ece7d8;      /* 본문(따뜻한 종이색) */
  --dim:#9aa3b2;        /* 보조 텍스트 */
  --faint:#6b7484;      /* 흐린 텍스트 */
  --amber:#f5a524;      /* 주 강조색 */
  --coral:#ff6b4a;      /* 보조 강조색 */
  --cyan:#39d0c3;       /* 링크/데이터 강조색 */
  /* 웹폰트 CDN 금지 — 시스템 세리프/산세리프 폴백 사용 */
  --serif:'Gowun Batang','Nanum Myeongjo','Batang',serif;
  --sans:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  --mono:'IBM Plex Mono','D2Coding',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--ink);color:var(--paper);font-family:var(--sans);
  line-height:1.9;overflow-x:hidden;
}
/* 종이 그리드 배경 */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1100px 500px at 80% -10%, rgba(245,165,36,.06), transparent 60%),
    radial-gradient(900px 600px at -10% 30%, rgba(57,208,195,.05), transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 39px, rgba(126,140,170,.05) 39px 40px),
    repeating-linear-gradient(90deg, transparent 0 39px, rgba(126,140,170,.05) 39px 40px);
}
::selection{background:rgba(245,165,36,.35)}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:#2a3242;border-radius:6px}
a{color:var(--cyan)}

/* ============ 상단 네비 바 ============ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;gap:10px;align-items:center;justify-content:space-between;
  padding:12px 22px;background:rgba(11,14,19,.82);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.topbar .tb-left,.topbar .tb-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tb-link{
  font-family:var(--mono);font-size:12px;color:var(--dim);text-decoration:none;
  border:1px solid var(--line);border-radius:99px;padding:6px 14px;transition:all .2s;
  white-space:nowrap;
}
.tb-link:hover{color:var(--amber);border-color:var(--amber)}
.tb-link.slides{color:var(--amber);border-color:rgba(245,165,36,.35);background:rgba(245,165,36,.08)}
.tb-link.slides:hover{background:var(--amber);color:#1a1205}

/* ============ 상단 진행바 + 사이드 네비 ============ */
#progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:110;
  background:linear-gradient(90deg,var(--amber),var(--coral));transition:width .1s}
nav.side{
  position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:80;
  display:flex;flex-direction:column;gap:11px;max-height:80vh;overflow:auto;
  padding:4px 0;scrollbar-width:none;
}
nav.side::-webkit-scrollbar{display:none}
nav.side a{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--faint);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;transition:color .25s}
nav.side a .dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--faint);transition:all .25s;flex:none}
nav.side a .lb{opacity:0;transform:translateX(-6px);transition:all .25s;white-space:nowrap}
nav.side a:hover .lb,nav.side a.on .lb{opacity:1;transform:none}
nav.side a.on{color:var(--amber)}
nav.side a.on .dot{background:var(--amber);border-color:var(--amber);box-shadow:0 0 10px rgba(245,165,36,.6)}
@media(max-width:1180px){nav.side{display:none}}

/* ============ 레이아웃 ============ */
.wrap{max-width:820px;margin:0 auto;padding:0 26px;position:relative;z-index:1}
.kicker{font-family:var(--mono);font-size:12px;letter-spacing:.32em;color:var(--amber);text-transform:uppercase;margin-bottom:14px}
.kicker .no{color:var(--faint)}

/* 히어로 */
header.hero{min-height:74vh;display:flex;align-items:center;padding:110px 0 50px;position:relative;z-index:1}
.hero .htag{font-family:var(--mono);font-size:12px;color:var(--cyan);letter-spacing:.28em;margin-bottom:22px}
.hero h1{font-family:var(--serif);font-weight:700;line-height:1.32;font-size:clamp(30px,5vw,50px)}
.hero h1 .sub{display:block;font-size:.5em;color:var(--amber);margin-top:16px;font-weight:400;line-height:1.5}
.hero .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:32px}
.chip{font-family:var(--mono);font-size:11.5px;border:1px solid var(--line);border-radius:99px;padding:6px 15px;color:var(--dim)}
.chip b{color:var(--paper);font-weight:500}
.scroll-hint{margin-top:48px;font-family:var(--mono);font-size:10px;letter-spacing:.4em;color:var(--faint)}

/* 공통 블록 */
section.block{padding:70px 0 30px}
h2.title{font-family:var(--serif);font-size:clamp(23px,3.6vw,33px);font-weight:700;line-height:1.4;margin-bottom:10px}
p.summary{color:var(--dim);font-size:16px;max-width:720px;margin-bottom:8px}

/* day 배지 */
.day-badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;
  border-radius:6px;padding:1px 8px;margin-left:8px;vertical-align:middle}
.day-badge.d1{color:var(--cyan);border:1px solid rgba(57,208,195,.4);background:rgba(57,208,195,.08)}
.day-badge.d2{color:var(--coral);border:1px solid rgba(255,107,74,.4);background:rgba(255,107,74,.08)}

/* 프롤로그 / 에필로그 */
.essay{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 38px;position:relative}
.essay.prologue{border-left:3px solid var(--cyan)}
.essay.epilogue{border-left:3px solid var(--amber)}
.essay .etag{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--faint);margin-bottom:16px;display:block}
.essay p{font-size:16.5px;color:var(--paper);margin-bottom:16px}
.essay p:last-child{margin-bottom:0}

/* 본문 문단 */
.body p{font-size:16.5px;color:var(--paper);margin:0 0 20px}
.body strong{color:var(--amber);font-weight:700}
.body ul{list-style:none;margin:0 0 20px;display:grid;gap:10px}
.body li{position:relative;padding-left:22px;color:var(--dim);font-size:15.5px}
.body li::before{content:'\25B8';position:absolute;left:4px;color:var(--amber)}

/* 핵심 포인트 박스 */
.keypts{background:var(--panel-2);border:1px dashed var(--line);border-radius:12px;padding:22px 26px;margin:26px 0 8px}
.keypts .kt{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--amber);margin-bottom:14px}
.keypts ul{list-style:none;display:grid;gap:11px}
.keypts li{position:relative;padding-left:26px;font-size:15px;color:var(--paper)}
.keypts li::before{content:'\2726';position:absolute;left:2px;color:var(--amber);font-size:13px}

/* "이 구간 슬라이드로 보기" 링크 */
.toslides{display:inline-flex;align-items:center;gap:8px;margin-top:22px;
  font-family:var(--mono);font-size:12.5px;color:var(--cyan);text-decoration:none;
  border:1px solid var(--line);border-radius:10px;padding:10px 16px;transition:all .2s}
.toslides:hover{border-color:var(--cyan);background:rgba(57,208,195,.08)}
.toslides .arw{transition:transform .2s}
.toslides:hover .arw{transform:translateX(4px)}

/* 인용 배지 [D1-pN] */
.cite{display:inline-flex;align-items:center;gap:4px;margin:0 2px;vertical-align:baseline;
  font-family:var(--mono);font-size:10.5px;color:var(--dim);text-decoration:none;
  border:1px solid var(--line);border-radius:99px;padding:1px 8px;transition:all .2s;white-space:nowrap}
.cite:hover{border-color:var(--amber);color:var(--amber);background:rgba(245,165,36,.08)}
.cite::before{content:'\25A4';font-size:9px;color:var(--amber)}

/* (배경지식)/(모델 지식) 마커 */
.mk{display:inline-block;font-family:var(--mono);font-size:10.5px;color:var(--faint);
  background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:1px 8px;margin:0 2px}

/* ============ 장 목차 ============ */
.toc-wrap{padding:60px 0 20px}
.toc-grid{display:grid;gap:12px;margin-top:24px}
.toc-item{display:grid;grid-template-columns:58px 1fr auto;gap:16px;align-items:start;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 22px;
  text-decoration:none;transition:all .25s}
.toc-item:hover{border-color:var(--amber);transform:translateX(5px)}
.toc-item .tc-no{font-family:var(--mono);font-size:20px;color:var(--amber);font-weight:600;line-height:1.2}
.toc-item .tc-title{color:var(--paper);font-size:16px;font-weight:700;font-family:var(--serif)}
.toc-item .tc-sum{color:var(--dim);font-size:13.5px;margin-top:4px;line-height:1.6}
.toc-item .tc-pg{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap;padding-top:4px}
@media(max-width:620px){.toc-item{grid-template-columns:44px 1fr}.toc-item .tc-pg{display:none}}

/* day 구분 헤더(목차 안) */
.toc-daysep{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--faint);
  margin:22px 0 4px;padding-top:6px;border-top:1px dashed var(--line)}
.toc-daysep:first-child{border-top:none;padding-top:0;margin-top:0}

/* 장 구분선 */
.chapter{border-top:1px solid var(--line)}
.chapter:first-of-type{border-top:none}

footer{padding:70px 0 90px;color:var(--faint);font-size:12.5px;font-family:var(--mono);
  border-top:1px solid var(--line);margin-top:70px;text-align:center;line-height:1.9}
footer a{color:var(--dim)}
</style>
</head>
<body>
<div id="progress"></div>

<!-- 상단 네비 바 -->
<div class="topbar">
  <div class="tb-left">
    <a class="tb-link" href="../../index.html">&larr; 세미나 목록</a>
  </div>
  <div class="tb-right">
    <a class="tb-link slides" href="index.html">🎞️ 슬라이드 해설</a>
  </div>
</div>

<!-- 사이드 진행 네비 -->
<nav class="side" id="sidenav"></nav>

<!-- 히어로 -->
<header class="hero" id="top">
  <div class="wrap">
    <div class="htag">인터랙티브 강의 노트 · 이어 읽기</div>
    <h1 id="heroTitle"></h1>
    <div class="meta" id="heroMeta"></div>
    <div class="scroll-hint">SCROLL &darr;</div>
  </div>
</header>

<div class="wrap" id="content"></div>

<footer>
  <div>AI 모델 경량화 · 이종률 교수 — 강의 노트</div>

</footer>

<script>
window.NOTE_DATA = {"title": "모델 경량화, 처음부터 끝까지: 무거운 AI를 어떻게 작은 기기에 담을까", "reading_time": "약 40분", "prologue": "이 세미나는 하나의 질문에서 출발한다 — 점점 커지는 인공지능 모델을 어떻게 스마트폰·엣지 같은 작은 기기에 담고, 서버에서도 싸게 돌릴 것인가 [D1-p6]. 이종률 교수는 이 질문에 답하기 위해 신경망 압축(Network Compression)의 전체 지형을 두 날에 걸쳐 안내한다 [D1-p1]. 1일차는 프루닝·분해·양자화·경량 아키텍처·지식 증류라는 고전적 도구 상자를 하나씩 열어 보이고, 이를 자동으로 조합·탐색하는 방향과 실제 배포 런타임까지 잇는다 [D1-p3][D1-p28]. 2일차는 무대를 현재로 옮겨, 객체 탐지(YOLO) 실습에서 시작해 파운데이션 모델이 왜 무겁고 왜 잘 되는지를 파고들고, 그 무거운 모델을 가볍게 하는 법과 멀티태스크 학습, 그리고 기기 위에서 직접 배우는 온디바이스 학습까지 나아간다 [D2-p1][D2-p3]. 이 노트는 467장의 슬라이드를 순서대로 나열하는 대신, '왜 이 순서로 배우는가'가 드러나도록 이어 읽히는 하나의 글로 다시 엮은 것이다.", "chapters": [{"id": "ch01", "title": "왜 경량화인가: 온디바이스 AI와 서버 추론 비용", "summary": "무거운 모델을 작은 기기에 올리고 서버에서도 싸게 돌리려는 것이 모든 압축의 출발점이다.", "pages": [4, 13], "body": "강의는 하나의 동기에서 시작한다 [D1-p6]. 서버에서 딥러닝을 처리하면 데이터가 밖으로 나가 프라이버시 문제가 생기고, 클라이언트-서버 통신 비용이 들며, 인터넷 연결이 반드시 필요하다 [D1-p6]. 그래서 기기 자체에서 AI를 돌리는 온디바이스(On-device) 딥러닝이 필요하지만, 대부분의 모델은 변형 없이는 스마트폰에 올릴 수 없을 만큼 크고, 압축을 하면 올릴 수 있으나 그 대가로 정확도가 떨어질 수 있다 [D1-p6]. 게다가 최근에는 서버에서 대규모 언어모델을 운영하는 추론 비용이 커지면서, 경량화가 온디바이스를 넘어 서버 사이드 비용 절감으로도 확장되었다 [D1-p6].\n\n그렇다면 압축한 모델은 실제로 어디에 얹히는가 [D1-p8]. 온디바이스 AI는 학습된 신경망 모델 → NN 컴파일러 → NN 런타임 → 하드웨어 드라이버 → 하드웨어로 이어지는 계층 구조로 동작한다 [D1-p8]. 컴파일러는 모델을 해석하고 실행 계획을 최적화하며, 런타임은 실제 추론을 수행하고 하드웨어 가속을 담당한다 [D1-p8]. 이 구조 사이에 프루닝·분해 같은 기법을 담당하는 신경망 압축기(NN Compressor)가 새로 끼어들고 [D1-p9], 어떤 실행 환경에서 돌릴지가 어떤 압축을 할지에 영향을 준다 [D1-p10].\n\n핵심은 최고 성능이 하드웨어와 소프트웨어를 함께 설계하는 코디자인(Co-design)에서 나온다는 점이다 [D1-p11]. 압축기·컴파일러·런타임·하드웨어를 따로 최적화하는 대신 서로 맞물리게 설계해야 하며, MIT의 송한(Song Han) 교수가 이 방향을 꾸준히 주장해 온 인물로 소개된다 [D1-p11]. 퀄컴의 SNPE 프레임워크는 학습부터 추론까지 이어지는 풀스택 사례로, 딥러닝 프레임워크로 만든 모델을 .dlc 파일로 변환하며 선택적으로 양자화·압축을 수행한 뒤 퀄컴 기기 위에서 실행한다 [D1-p12].\n\n그렇다면 경량 모델을 처음부터 직접 설계하는 것과 기존 모델을 압축하는 것 중 무엇이 나을까 [D1-p13]. 강연자의 답은 어느 쪽이 더 낫다는 이론적 보장은 없다는 것이다 [D1-p13]. 압축은 이미 학습된 가중치를 재활용하므로 미세 조정 효율에는 유리하지만, 더 좋은 최종 성능까지 보장하지는 않는다 [D1-p13]. 실무적으로 더 중요한 교훈은, 경량화에 착수하기 전에 모델 크기·메모리·지연시간·목표 하드웨어·요구 정확도·배포 런타임을 먼저 합의해야 한다는 것이다 [D1-p13]. 그렇지 않으면 상용화 기준이 90%인데 베이스가 90.4%로 넘어와 경량화 후 89.9%로 떨어지는 식의 책임 공방이 모델팀·경량화팀·런타임팀 사이에 생긴다 [D1-p13].", "key_points": ["경량화의 동기는 프라이버시·통신비용·오프라인 동작이며, 최근에는 서버 LLM 추론 비용 절감으로도 확장됐다 [D1-p6].", "온디바이스 AI는 모델→컴파일러→런타임→하드웨어 계층 구조이고, 압축기는 그 사이에 위치한다 [D1-p8][D1-p9].", "최고 성능은 하드웨어-소프트웨어 코디자인에서 나온다 [D1-p11].", "처음부터 설계 vs 압축에 이론적 우열은 없으며, 착수 전 정확도·속도·메모리·타겟 HW를 먼저 합의해야 한다 [D1-p13]."]}, {"id": "ch02", "title": "산업은 이미 경량화로 움직인다", "summary": "구글·엔비디아·삼성·네이버·스타트업의 사례로 경량화가 실제 제품과 연구를 어떻게 끌고 가는지 본다.", "pages": [14, 27], "body": "이론에 앞서 강의는 산업 현장이 이미 경량화로 움직이고 있음을 보여준다 [D1-p14]. 구글은 모바일 개발자가 기기에서 바로 실행되도록 최적화된 머신러닝 기능을 쓸 수 있게 ML Kit을 제공한다 [D1-p16]. 바코드 스캔·얼굴 인식 같은 비전 기능을 오프라인에서도 돌릴 수 있는 도구다 (배경지식). 엔비디아는 빠른 추론을 위한 소프트웨어(TensorRT, Triton)와 엣지 하드웨어(Jetson TX2, NANO)를 함께 제공한다 [D1-p18].\n\n삼성전자는 세탁기·8K TV 업스케일링·스마트폰 카메라 등 다양한 제품군에 온디바이스 AI를 탑재하며, 처리 위치가 서버 → 모바일 AP → 이미지 센서(온센서 AI) → 사물인터넷으로 점점 기기 가까이 이동하는 흐름을 강조한다 [D1-p19]. 특히 갤럭시 S24 울트라는 인터넷 없이 실시간 통역·음성 문자 변환·서클 투 서치 같은 서비스를 온디바이스로 제공해, 온디바이스 AI를 대중적으로 각인시킨 사례로 소개된다 [D1-p22]. 네이버는 트랜스포머 기반 대규모 모델의 경량화 인력을 확보하며 삼성전자 DS부문과 AI 반도체 협업을 진행한다 [D1-p23].\n\n스타트업 사례로는 모델 경량화 기술로 상장한 Nota AI가 등장하는데, 강연자는 경량화 기술만으로는 사업화가 쉽지 않아 실제 적용할 애플리케이션과 비즈니스 모델을 잘 찾아야 한다는 교훈을 함께 전한다 [D1-p24]. 연구의 무게중심도 이동하고 있다 [D1-p25]. 과거 엣지에서는 이미지 분류·객체 탐지·음성 문자 변환 같은 가벼운 인지 작업이 주로 처리됐지만 [D1-p26], 이제는 디퓨전 모델·대규모 언어모델·비전-언어 모델처럼 더 강력한 파운데이션 모델을 모바일에 올리는 것이 주요 이슈가 됐다 [D1-p25]. 실제로 디퓨전 모델로 그림을 생성하거나 터미널에서 LLM을 구동하는 온디바이스 생성형 AI 데모가 그 수요를 구체적으로 보여준다 [D1-p27]. 이 흐름은 2일차에서 다룰 파운데이션 모델 경량화로 곧장 이어진다 [D1-p25].", "key_points": ["구글 ML Kit, 엔비디아 TensorRT/Jetson, 삼성 온센서 AI 등 주요 기업이 온디바이스 AI를 제품에 탑재하고 있다 [D1-p16][D1-p18][D1-p19].", "갤럭시 S24의 온디바이스 실시간 번역이 온디바이스 AI를 대중화한 대표 사례다 [D1-p22].", "경량화 기술만으로는 사업화가 어려워 적용처와 비즈니스 모델이 중요하다(Nota AI) [D1-p24].", "연구 중심이 경량 인지 모델에서 파운데이션 모델의 온디바이스화로 옮겨가고 있다 [D1-p25][D1-p26]."]}, {"id": "ch03", "title": "프루닝: 무엇을, 어떤 단위로 잘라낼 것인가", "summary": "압축을 '근사'로 정의하고, 연결·채널·토큰을 잘라내는 프루닝이 비정형에서 구조적으로 진화하는 과정을 따라간다.", "pages": [29, 48], "body": "본격적인 압축 기법은 하나의 정의에서 출발한다 [D1-p29]. 신경망 N이 정의하는 함수 f를 잘 흉내 내는 더 가벼운 근사 함수 f̃를 찾는 것, 그것이 모델 압축이다 [D1-p29]. 즉 압축은 곧 근사(Approximation)이며, 원래 모델과 최대한 비슷하게 동작하는 가벼운 모델을 찾는 문제로 볼 수 있다 [D1-p29]. 신경망을 그래프로 보면, 쓸 만한 부분그래프를 찾아 원래 망을 근사하는 위상 수준 압축이 되고, 그 방법론이 연결(시냅스)이나 뉴런을 잘라내는 프루닝이다 [D1-p30].\n\n프루닝은 여러 단위로 이뤄진다 [D1-p31]. 개별 연결을 자르는 가중치 프루닝, 합성곱 채널을 통째로 자르는 채널 프루닝, 트랜스포머의 어텐션 헤드를 자르는 어텐션 프루닝, 잔차 블록 전체를 건너뛰는 블록 프루닝까지 잘게부터 크게까지 가능하다 [D1-p31]. 가장 기본인 가중치 프루닝은 연결 학습 → 중요도 낮은 연결 제거 → 남은 가중치 재학습의 3단계를 반복해 정확도를 회복하며, 잘라낸 위치는 마스크로 표시한다 [D1-p32]. 그 결과는 0이 많은 희소 행렬이 되어, 0이 아닌 값과 위치만 저장하면 공간을 아낄 수 있다 [D1-p33]. 다만 위치도 함께 저장해야 하므로 연결을 p% 줄인다고 저장 공간이 정확히 p% 줄지는 않는다 [D1-p34]. 대신 0을 곱하는 낭비 연산을 건너뛰어 행렬 곱셈을 빠르게 하는 쪽으로 이득을 얻고 [D1-p35][D1-p36], CSR·COO 같은 여러 저장 포맷이 존재한다(외울 필요는 없다) [D1-p37].\n\n여기서 강의는 첫 번째 중요한 함정을 짚는다 [D1-p38]. 가중치 프루닝은 이해·구현이 쉽고 90% 이상 잘라내도 정확도가 의외로 잘 버티지만, 희소 연산을 런타임이나 하드웨어가 지원하지 않으면 실제 속도 이득이 없다 [D1-p38]. 범용 런타임은 희소 연산을 충분히 지원하지 않는 경우가 많아, 0을 아무리 많이 만들어도 조밀 곱셈을 그대로 쓰면 소용이 없다 [D1-p38]. 그래서 산업에서는 잘 쓰이지 않으며, Neural Magic 같은 전용 런타임이나 0을 건너뛰는 NPU가 있어야 실효가 있다 [D1-p38][D1-p39].\n\n이 한계를 피하려는 것이 채널 프루닝이다 [D1-p40]. 개별 연결이 아니라 덜 중요한 채널(차원)을 통째로 잘라 층의 폭 자체를 줄이므로, 특수 하드웨어 없이도 일반 런타임에서 바로 빨라진다 [D1-p40][D1-p44]. 합성곱에서 한 채널을 없애려면 그것을 만들어 낸 필터와 그것을 받아 쓰는 다음 층의 커널을 함께 정리해야 하며, 스킵 연결이나 결합이 있으면 처리가 어려워 전용 파서가 필요하다 [D1-p41][D1-p43]. 채널 선택 방법은 많지만 성능 차이가 크지 않아, 실무에서는 간단한 L1-norm으로 고르고 파인튜닝하는 편이 낫다는 조언도 곁들여진다 [D1-p42]. 다만 차원 자체가 줄어 표현력 손실이 있어 가중치 프루닝만큼 과감히 자르기는 어렵다 [D1-p44]. 트랜스포머에서는 self-attention 연산이 토큰 수의 제곱으로 커지므로, 정보량 낮은 토큰을 잘라내는 토큰 프루닝과 유사 토큰을 합치는 토큰 병합으로 계산을 줄인다 [D1-p45][D1-p46][D1-p47][D1-p48].", "key_points": ["모델 압축은 원래 함수 f를 잘 근사하는 가벼운 f̃를 찾는 문제로 정의된다 [D1-p29].", "가중치 프루닝은 정확도는 잘 버티지만 희소 연산을 런타임·HW가 지원해야 실제로 빨라진다 [D1-p32][D1-p38].", "채널 프루닝은 층의 폭을 줄여 일반 런타임에서도 속도가 붙어 실무에서 널리 쓰이나, 압축 폭은 더 작다 [D1-p40][D1-p44].", "트랜스포머는 토큰 수가 병목이라 토큰 프루닝·병합으로 계산을 줄인다 [D1-p45][D1-p48]."]}, {"id": "ch04", "title": "분해와 양자화, 그리고 기법의 결합", "summary": "행렬을 작은 곱으로 쪼개는 분해와 비트를 낮추는 양자화를 배우고, 이들을 겹쳐 쓴 Deep Compression으로 결합의 위력을 확인한다.", "pages": [49, 78], "body": "프루닝이 '자르는' 압축이라면, 분해는 '쪼개는' 압축이다 [D1-p49]. SVD는 큰 가중치 행렬을 세 조각으로 나누고 작은 특잇값을 버려 근사하는데, 한 층 Wx를 두 개의 작은 층으로 대체해 곱셈 수를 줄인다 [D1-p49][D1-p50]. 주로 RNN·트랜스포머·단어 임베딩 행렬 같은 자연어처리에 쓰이지만, CNN의 4차원 합성곱 텐서에는 2차원용 SVD를 그대로 쓰기 어렵다 [D1-p51]. 그래서 CNN에는 Tucker 분해가 쓰이는데, 무거운 합성곱을 채널 축소(1x1) → 핵심 DxD 합성곱 → 채널 확장(1x1)의 세 단계로 나눈다 [D1-p52][D1-p54][D1-p55]. 크기·속도에는 효과적이지만 적절한 rank를 찾기 어렵고, 하나의 층이 여러 층으로 쪼개져 레이어 수가 늘면 일부 런타임에서는 오히려 느려질 수 있다는 함정이 있다 [D1-p56].\n\n양자화는 구조를 바꾸지 않고 값의 표현 비트를 낮추는 방식이다 [D1-p58]. 32비트 실수 대신 정수 범위로 대응시키는 선형 양자화에서, 실수 0을 정확히 담기 위해 제로 포인트가 필요하다 [D1-p59]. activation에는 비대칭, weight에는 영점이 사라져 간단한 대칭 양자화를 주로 쓰고, 완전연결층 출력도 정수 곱과 배율만으로 계산할 수 있다 [D1-p60][D1-p61][D1-p62]. 값 분포를 더 잘 담으려 텐서·채널·토큰 단위로 스케일을 다르게 주는 세분도(granularity)도 도입되나, 세밀할수록 병렬 계산과 구현이 어려워진다 [D1-p63].\n\n저장을 더 줄이려는 기법이 K-means 가중치 공유다 [D1-p64]. 비슷한 가중치들을 군집으로 묶어 대표값(centroid)만 코드북에 저장하고 각 위치에는 클러스터 인덱스만 두면, 인덱스를 적은 비트로 저장해 모델 전송·패키징 비용을 크게 줄인다 [D1-p65][D1-p66][D1-p67]. 같은 클러스터의 그래디언트를 모아 중심값을 갱신하는 재학습도 가능하지만 매우 느려 추론용이 아니다 [D1-p68]. 후처리 양자화의 정확도 하락을 줄이려면 학습 중에 양자화를 흉내 내는 양자화 인식 학습(QAT)을 쓰는데, round·sign이 미분 불가능한 문제는 역전파에서 기울기를 그대로 통과시키는 Straight-Through Estimator(STE)로 우회한다 [D1-p69][D1-p70]. STE는 엄밀한 미분은 아니지만 실제로 잘 통한다 [D1-p70]. 비트를 극단으로 낮춘 이진화(+1/-1)는 곱셈을 크게 단순화하지만 표현력이 줄어 성능 유지가 어렵다 [D1-p71].\n\n그렇다면 이 기법들을 따로 쓸까, 겹쳐 쓸까 [D1-p72]. Deep Compression은 프루닝(약 9~13배)에 양자화(코드북 군집화, 약 30배), 허프만 부호화까지 얹어 정확도 손실 거의 없이 최대 약 49배를 달성했다 [D1-p73][D1-p74]. 모델을 키우던 당시 흐름에서 정확도 손실 없는 49배 압축은 충격적인 결과로 받아들여졌고, 각 기법이 줄이는 축이 달라 중첩하면 손실을 억제하며 압축률을 크게 높일 수 있음을 보였다 [D1-p73][D1-p74]. 구글의 Learn2Compress는 모델을 넣으면 프루닝·양자화·지식 증류를 자동으로 적용해 작은 모델로 바꿔 주는 서비스로, 실제 경량화가 단일 기법보다 여러 기법을 겹친 파이프라인임을 잘 보여준다 [D1-p75][D1-p76][D1-p77][D1-p78].", "key_points": ["SVD는 FC·임베딩에, Tucker는 CNN의 4D 합성곱 텐서에 쓰이나, 레이어 수 증가로 오히려 느려질 수 있다 [D1-p49][D1-p52][D1-p56].", "양자화는 비대칭/대칭, 세분도, K-means 가중치 공유, 그리고 학습 중 시뮬레이션(QAT)으로 발전한다 [D1-p59][D1-p64][D1-p69].", "STE는 엄밀한 미분이 아니지만 미분 불가능한 양자화를 학습 가능하게 만드는 실용적 편법이다 [D1-p70].", "Deep Compression은 프루닝+양자화+허프만을 겹쳐 정확도 손실 없이 최대 약 49배를 달성했다 [D1-p73][D1-p74]."]}, {"id": "ch05", "title": "처음부터 가볍게: 경량 아키텍처 설계", "summary": "기존 모델을 줄이는 대신 애초에 가벼운 구조를 설계하는 흐름을 MobileNet에서 경량 ViT까지 따라간다.", "pages": [79, 103], "body": "압축이 기존 모델을 줄이는 길이라면, 또 하나의 길은 애초에 가벼운 구조를 설계하는 것이다 [D1-p79]. MobileNet은 일반 합성곱을 채널별 공간 연산(depthwise)과 1x1 채널 변환(pointwise)으로 쪼개는 깊이별 분리 합성곱으로 계산량을 크게 줄인다 [D1-p80][D1-p81]. V2는 여기에 잔차 연결을 더하고, 1x1으로 채널을 늘렸다가 depthwise 후 다시 줄이는 inverted residual(선형 병목) 구조를 도입했다 [D1-p82][D1-p83]. 여기에 채널별 중요도를 학습해 강조하는 SE 모듈과, depth·width·해상도를 함께 키우는 복합 스케일링의 EfficientNet 계열이 이어진다 [D1-p84].\n\n다음 무대는 트랜스포머다 [D1-p85]. Vision Transformer는 이미지를 패치(토큰)로 나눠 처리하며, CNN처럼 이웃만 보는 국소 연결과 달리 모든 패치가 서로 연결돼 구조적 편향(inductive bias)이 적다 [D1-p88][D1-p89]. 편향이 적은 만큼 대규모 데이터로 사전학습해야 제 성능이 나오며, 가장 큰 JFT-300M으로 사전학습한 ViT가 여러 데이터셋에서 최고 성능을 보인다 [D1-p90][D1-p91]. 다만 강력한 만큼 엣지 기기에는 여전히 무거워 CNN과 경량화 연구가 계속 필요하다 [D1-p93].\n\n그래서 경량 ViT가 등장한다 [D1-p94]. MobileViT는 MobileNetV2식 처리로 토큰 수를 줄인 뒤 트랜스포머를 적용하고 다시 합성곱으로 돌아오는 방식으로, 비슷한 파라미터의 경량 CNN보다 높은 정확도를 냈다 [D1-p94][D1-p95][D1-p96]. 관찰의 핵심은 ViT의 속도가 연산량보다 Reshape·Copy 같은 메모리 비효율 연산에 발목 잡힌다는 점이다 [D1-p97]. EfficientViT는 self-attention 하나를 여러 FFN이 앞뒤로 감싸는 샌드위치 배치와, 멀티헤드 어텐션을 단일헤드로 쪼개 순차로 잇는 캐스케이드 그룹 어텐션으로 메모리 피크를 낮추고 처리량을 개선한다 [D1-p98][D1-p99][D1-p100][D1-p101]. 처리량-정확도 그래프에서 EfficientViT 곡선이 다른 모델보다 오른쪽 위에 놓여 더 나은 균형을 보인다 [D1-p102]. 이렇게 사람이 좋은 구조를 손으로 찾는 데는 한계가 있어, 최적화로 구조를 자동 탐색하는 AutoML이 다음 화두로 제시된다 [D1-p103].", "key_points": ["MobileNet은 깊이별 분리 합성곱으로, V2는 inverted residual로 계산량을 줄인 경량 CNN이다 [D1-p80][D1-p82].", "ViT는 편향이 적어 데이터가 많으면 CNN을 능가하지만 온디바이스엔 여전히 무겁다 [D1-p89][D1-p93].", "ViT의 실제 병목은 연산량보다 메모리 비효율 연산이며, EfficientViT는 이를 겨냥해 처리량을 높인다 [D1-p97][D1-p101].", "손수 설계의 한계는 구조를 자동 탐색하는 AutoML로 이어진다 [D1-p103]."]}, {"id": "ch06", "title": "지식 증류: 큰 모델의 지혜를 물려주다", "summary": "큰 교사 모델의 출력과 중간 특징을 작은 학생 모델에 전달해 정확도를 끌어올리는 학습 기법을 본다.", "pages": [104, 110], "body": "압축을 학습 단계에서 돕는 대표 기법이 지식 증류다 [D1-p104]. 큰 교사(teacher) 모델의 부드러운 출력 분포를 작은 학생(student) 모델의 학습에 더해, 정답 라벨이 주지 못하는 클래스 간 유사성 정보(dark knowledge)를 전달한다 [D1-p105]. 가장 단순한 형태는 학생이 교사의 출력을 따라가도록 KL 발산 손실을 더하는 것이다 [D1-p106].\n\n여기서 한 걸음 나아가면, 마지막 출력만 맞추는 대신 교사와 학생의 중간 특징까지 맞출 수 있다 [D1-p109]. 예컨대 층 사이 정보 흐름을 담은 FSP 행렬을 교사에서 학생으로 전달하는 특징 기반 증류가 있으며, 증류는 크게 출력(로짓)을 맞추는 방식과 중간 특징을 직접 맞추는 방식으로 나뉜다 [D1-p107][D1-p108][D1-p109].\n\n지식 증류의 매력은 특수 하드웨어나 런타임이 필요 없는 순수 학습 기법이라는 데 있다 [D1-p110]. 그래서 경량화된 모델의 정확도를 조금이라도 끌어올리는 데 쓸 수 있고, 특히 목표 정확도에 아슬아슬하게 못 미칠 때 마지막 성능 보완 수단이 된다 [D1-p110]. 다만 최종 성능 향상을 이론적으로 보장하지는 않으며, 어떤 학생 모델을 설계할지가 어렵다는 한계가 함께 지적된다 [D1-p110]. 학습을 안정화하고 더 적은 epoch으로 좋은 성능에 도달하게 돕는다는 점이 실용적 가치다 [D1-p105].", "key_points": ["지식 증류는 교사의 soft 출력으로 라벨이 못 주는 클래스 간 유사성을 학생에게 전달한다 [D1-p105][D1-p106].", "출력을 맞추는 증류에서 중간 특징(FSP 등)을 맞추는 증류로 확장된다 [D1-p108][D1-p109].", "특수 하드웨어가 필요 없어 목표 정확도에 아슬아슬할 때의 마지막 보완 카드로 쓸 수 있다 [D1-p110]."]}, {"id": "ch07", "title": "모델은 런타임 위에서만 빨라진다", "summary": "TFLite·TensorRT·ONNX Runtime 등 배포 런타임을 살피며, 실제 속도는 타겟 하드웨어·런타임이 결정한다는 교훈을 잡는다.", "pages": [111, 132], "body": "앞 장들에서 반복된 함정 — 압축을 해도 런타임이 받쳐 주지 않으면 빨라지지 않는다 — 이 장의 주제다 [D1-p111]. 온디바이스 추론을 비교적 쉽게 하려면 Keras/TF 모델을 변환해 쓰는 TensorFlow Lite가 대표적이며, 입출력 규격을 정의하는 Signature와 함께 dynamic range·full integer 양자화를 제공한다 [D1-p112][D1-p113][D1-p114][D1-p115]. 상황에 맞는 양자화 방식을 고르는 의사결정 순서도까지 안내된다 [D1-p116]. 파이토치 계열에는 모바일 런타임이 있고, 일반 CPU에서도 희소 모델을 빠르게 돌려 주는 Neural Magic 같은 런타임도 있다 [D1-p117][D1-p118].\n\nNVIDIA 환경의 사실상 표준은 TensorRT다 [D1-p119]. 단순 실행이 아니라 conv·bias·activation을 하나로 묶는 층 결합(layer fusion) 같은 그래프 최적화로 빠르게 만들고, 결합으로 대표 신경망의 층 개수가 크게 줄어든다 [D1-p121][D1-p122][D1-p123]. 강연자는 NVIDIA Jetson에 올린다면 TensorRT를 가장 먼저 고려하라고 당부하며, 때로는 모델을 억지로 줄이기보다 하드웨어와 구현을 잘 쓰는 편이 더 중요할 수 있다는 지인의 말을 전한다 [D1-p119][D1-p120].\n\n환경을 가리지 않고 일단 돌려봐야 한다면 ONNX Runtime이 좋은 선택지다 [D1-p124]. 프레임워크 난립기에 모델 교환 표준으로 나온 ONNX는 학습 프레임워크와 배포 하드웨어 사이를 잇는 다리 역할을 하며, Execution Provider로 연산별로 CUDA·CPU·OpenVINO 등 실행 장치를 지정할 수 있다 [D1-p125][D1-p126][D1-p129][D1-p130]. 벤더별로는 인텔 OpenVINO, 퀄컴 SNPE, 삼성 NPU 같은 전용 도구가 있어, 결국 타겟 하드웨어에 맞춰 경량화와 배포를 함께 고려해야 한다 [D1-p131]. 요컨대 디바이스 → 런타임 → 모델 순으로 결정하는 것이 실무적으로 편하며, 같은 모델이라도 어디서 어떤 연산을 지원받느냐에 따라 실제 속도 개선 여부가 달라진다 [D1-p116][D1-p132].", "key_points": ["TFLite는 온디바이스 추론의 대표 선택지로 여러 양자화 방식과 의사결정 순서도를 제공한다 [D1-p112][D1-p116].", "TensorRT는 NVIDIA의 표준으로 층 결합 등 그래프 최적화로 가속하며, 때로는 모델 축소보다 런타임이 더 중요하다 [D1-p119][D1-p121].", "ONNX Runtime은 표준 교환 포맷+Execution Provider로 다양한 하드웨어에 배치하기 좋다 [D1-p124][D1-p129].", "실무는 디바이스→런타임→모델 순으로 정하는 것이 편하다 [D1-p116]."]}, {"id": "ch08", "title": "사람 손을 떠나: 자동 압축과 학습 가능한 프루닝", "summary": "층별 비율을 손으로 정하던 시대를 지나, 압축 전략을 탐색하고 무엇을 자를지 학습으로 정하는 방향으로 나아간다.", "pages": [133, 194], "body": "고급 기법 단원은 '사람의 손을 얼마나 뗄 수 있는가'라는 물음으로 요약된다 [D1-p133]. 먼저 프루닝 후 실제 축소 모델을 자동으로 뽑으려면 프레임워크별로 모델 구조를 프로그램적으로 바꿔야 하는데, 레이어 연결이 JSON에 잘 저장되는 Functional API가 유리하고 Subclass API는 자동 변환이 어렵다 [D1-p134][D1-p135][D1-p136][D1-p137]. 나아가 경량화 자체를 '어떤 기법을 어떤 순서·강도로 적용할지'를 고르는 넓은 탐색 문제로 정의하면, 압축 행동(compression action)의 시퀀스를 최적화하는 문제가 된다 [D1-p138][D1-p139][D1-p140]. 강연자의 도구는 나쁜 해도 확률적으로 받아들여 지역 최소를 피하는 담금질(Simulated Annealing)로 전략을 탐색하고, 한 번 돌린 결과를 새 출발점 삼아 다시 압축하는 '라운드' 개념을 쓴다 [D1-p141][D1-p146][D1-p147]. 여기에는 실무 팁이 붙는다 — 양자화는 맨 마지막에 한 번만 적용해 압축 배수의 일부를 떠넘기고, 후보 평가는 validation의 10%만 써도 충분하다 [D1-p147][D1-p148]. 이 자동 압축은 CIFAR10-VGG16 등에서 사람 개입 없이 20~35배 압축을 달성했다 [D1-p149].\n\n다음은 '무엇을 자를지'를 학습으로 정하는 미분 가능 프루닝이다 [D1-p150]. 채널을 살릴지(1)/지울지(0)라는 이진 결정에는 기울기가 흐르지 않으므로, 마스크를 정의하고 그것을 부드럽게 근사한 뒤 희소성 정규화를 더하는 3단계 레시피를 쓴다 [D1-p151][D1-p153]. Kim et al.은 학습 가능한 게이트 층으로 출력 텐서에 채널별 마스크를 곱하고, Xiao et al.은 STE로 순전파엔 계단 마스크를, 역전파엔 매끄러운 함수의 기울기를 대신 쓴다 [D1-p155][D1-p156][D1-p159][D1-p160]. 다만 강연자는 이 접근이 개념적으로 흥미롭지만 학습 비용이 크고 성능 향상은 매우 드라마틱하지 않다고 솔직하게 평가한다 [D1-p150][D1-p162][D1-p163].\n\n분해와 데이터 관점의 압축도 이어진다 [D1-p167]. 구형 언어모델은 어휘 크기 x 차원의 임베딩 행렬이 큰 비중을 차지하므로, SVD로 임베딩을 저차원 근사해 임베딩+1x1 Conv 두 층으로 나누면 최대 20배까지 줄여도 성능을 상당히 유지한다 [D1-p167][D1-p168][D1-p169][D1-p170]. 또 데이터를 대표하는 부분집합(coreset) 개념을 필터에 적용해, 각 필터를 벡터로 보고 대표 소수만 남기는 방식은 과도하게 커진 모델에서 Deep Compression의 49배를 크게 넘는 압축률을 보였다(단, 원본이 과하게 컸던 덕도 있다) [D1-p171][D1-p172][D1-p173][D1-p175].\n\n이 장의 하이라이트는 채널 프루닝의 전역화다 [D1-p176][D1-p179]. 층별 프루닝 비율을 강화학습으로 정하던 AMC를 지나, 게이트에 걸리는 gradient 제곱합으로 채널 중요도를 매겨 전체 채널을 하나의 공통 기준으로 비교하는 Group Fisher Pruning이 제안된다 [D1-p176][D1-p179][D1-p180][D1-p181]. 잔차 연결로 함께 잘려야 하는 채널들은 각 위치의 gradient를 더해 하나의 점수로 처리해 구조적 결합까지 반영하며, 강연자는 지금도 실무에서 많이 쓰이는 기법이라며 '꼭 기억하라'고 특별히 당부한다 [D1-p181][D1-p182]. 후속 연구는 라벨 없이 지식 증류로 교사 출력을 흉내 내며 한 번에 여러 채널을 지워 속도를 높이고 [D1-p183][D1-p188], 나아가 입력 난이도에 따라 쓰는 채널 수를 바꾸는 동적 프루닝, 멀티모달 LLM에서 그래프 관점으로 시각 토큰을 학습 없이 자르는 방향으로 확장된다 [D1-p189][D1-p190][D1-p192][D1-p193][D1-p194]. 다만 동적 프루닝은 이를 지원하는 런타임이 드물어 이론적 FLOPs 감소에 그치는 경우가 많다는 한계가 함께 지적된다 [D1-p192].", "key_points": ["경량화를 압축 행동의 시퀀스 탐색으로 보고 담금질로 자동 조합하며, 양자화는 마지막에 한 번만 적용한다 [D1-p138][D1-p147].", "미분 가능 프루닝은 개념은 흥미롭지만 비용 대비 성능 향상이 크지 않다는 평가를 받는다 [D1-p150][D1-p162].", "Group Fisher Pruning은 gradient 제곱으로 전체 채널을 전역 비교하고 잔차 결합까지 반영하는, '꼭 기억할' 기법이다 [D1-p180][D1-p181][D1-p182].", "동적 프루닝은 실제 지원 런타임이 드물어 실측 지연 이득이 불확실하다 [D1-p189][D1-p192]."]}, {"id": "ch09", "title": "한 번 학습해 여러 기기로: 탐색·이종 증류와 남은 난제", "summary": "하나의 큰 망에서 여러 기기용 서브넷을 뽑는 NAS 계열과 구조가 다른 모델 간 증류를 보고, 1일차가 남긴 근본 난제로 마무리한다.", "pages": [195, 221], "body": "배포 타겟마다 모델을 따로 최적화하면 비용이 크다는 문제에서 새로운 갈래가 시작된다 [D1-p195]. Once-for-All은 하나의 큰 네트워크를 한 번 학습한 뒤 kernel·width·depth를 탄력적으로 조절해 재학습 없이 여러 서브네트워크를 뽑아내며, 기기마다 실제로 다른 구조가 선택된다 [D1-p195][D1-p196][D1-p197]. 여러 모바일 하드웨어에서 MobileNetV3를 일관되게 능가하며 더 적은 연산·지연으로 SOTA 정확도를 달성했다 [D1-p198][D1-p199]. 이후 탐색 공간의 상당수가 불필요하다는 관찰에서 깊이·너비를 함께 묶어 탐색 비용을 절반으로 낮춘 CompOFA가 나온다 [D1-p200][D1-p201].\n\n정확도만이 아니라 지연을 직접 고려하려는 것이 LANA다 [D1-p202]. 교사의 각 층마다 여러 대체 모듈을 준비해 증류로 미리 흉내 내게 하고, 각 모듈의 하드웨어 지연을 측정해 두었다가 질의 시 정확도·지연 요구에 맞춰 층별 모듈을 골라 넓은 탐색 공간을 낮은 비용으로 다룬다 [D1-p203][D1-p204][D1-p205]. 강연자 본인의 연구 Bespoke는 여기서 한 걸음 더 나아가, 레이어가 아니라 더 큰 블록(서브네트워크) 단위로 공개된 사전학습 모델의 블록을 가져와 무거운 부분을 교체하며, LANA와 성능은 비슷하되 탐색 비용은 더 적게 든다 [D1-p206][D1-p207][D1-p208][D1-p209].\n\n증류도 확장된다 [D1-p210]. 비전 트랜스포머를 채널·헤드·블록 프루닝과 증류로 통합 압축하고, 교사가 ViT·학생이 CNN처럼 구조가 전혀 다른 이종 조합에서도 교사의 최종 예측을 지식으로 삼아 증류한다 [D1-p210][D1-p211]. 교사가 정답 클래스에 보이는 확신도를 반영해 증류 손실을 조절하고, 교사의 한 층 특징을 학생의 여러 층에 걸쳐 학습하게 하는 유연한 층 정합으로 성능을 끌어올린다 [D1-p212][D1-p213][D1-p214][D1-p215].\n\n1일차는 압축이 왜 어려운가라는 근본 난제로 마무리된다 [D1-p216]. 한 채널을 지우면 다른 채널의 중요도가 바뀌어 압축 결정들이 서로 얽혀 있고 [D1-p217], 프루닝 직후 정확도와 미세조정 후 정확도가 어긋나 프루닝 시점에 결과를 알기 어렵다 [D1-p218]. 특징 중요도 평가 자체가 어렵고 중요도와 효율을 한 최적화로 결합하기는 더 어려우며 [D1-p219], 채널 프루닝과 양자화처럼 성격이 다른 기법을 휴리스틱 없이 공정하게 결합하는 것도 여전히 열린 문제다 [D1-p220]. 이 난제들이 바로 2일차가 다룰 자동화·파운데이션 모델·온디바이스 학습의 배경이 된다 [D1-p221].", "key_points": ["Once-for-All은 한 번 학습한 큰 망에서 여러 기기용 서브넷을 재학습 없이 뽑는다 [D1-p195][D1-p196].", "LANA는 층별 대체 모듈을 증류+지연 측정으로 조합하고, Bespoke는 더 큰 블록 단위로 낮은 비용에 교체한다 [D1-p202][D1-p206][D1-p209].", "구조가 다른 교사-학생 간에도 이종 증류가 가능하며 유연한 층 정합으로 성능을 높인다 [D1-p211][D1-p214].", "압축 결정의 얽힘, 프루닝-미세조정 정확도 괴리, 이질 기법 결합이 1일차가 남긴 근본 난제다 [D1-p217][D1-p218][D1-p220]."]}, {"id": "ch10", "title": "실전의 문: 객체 탐지와 YOLO의 진화", "summary": "2일차는 손에 잡히는 과제인 객체 탐지에서 출발해, YOLO가 v1부터 v26까지 어떻게 더 빠르고 정확해졌는지 훑는다.", "pages": [4, 20], "body": "2일차는 파운데이션 모델 경량화를 주제로 삼되, 손에 잡히는 과제부터 연다 [D2-p1]. 객체 탐지는 이미지 속 관심 대상을 종류와 위치까지 찾아내는 컴퓨터 비전의 근본 과제로, 사진 전체에 이름표 하나만 붙이는 이미지 분류와 달리 물체를 네모 상자로 함께 표시한다 [D2-p4]. 객체 하나는 경계 상자와 종류로 표현되며, 후보 상자를 찾고 각 상자의 종류를 판별하는 두 단계를 거친다 [D2-p5]. 학습 목표도 분류만 쓰는 이미지 분류와 달리, 종류를 맞추는 분류 손실과 상자 위치를 맞추는 회귀 손실을 가중합한 것이다 [D2-p6][D2-p7].\n\nYOLO(You Only Look Once)는 이미지를 격자로 나눠 각 칸마다 상자와 종류 확률을 예측해 '한 번만 보고' 탐지한다 [D2-p8]. 이후 버전들은 이론적 정당성보다 실측 성능을 중시해 좋은 기법이면 받아들이는 실용주의로 발전했다 [D2-p12]. v2는 배치 정규화·앵커 박스·새 네트워크 등을 누적해 정확도를 63.4에서 78.6 mAP로 끌어올렸고 [D2-p9], v4는 여러 기법을 폭넓게 검토해 최신 기법을 선별하며 Mosaic 같은 데이터 증강을 도입했다 [D2-p10][D2-p11]. v5는 새 CSP-Darknet 백본과 SPPF·CSP-PAN 넥을 채택하고 [D2-p12][D2-p13], v8은 C2f 모듈과 디커플드 헤드로 개선해 더 작고 빠른 조건에서 더 높은 정확도를 냈다 [D2-p14][D2-p15][D2-p16]. v11은 하나의 모델로 탐지·분할·분류·포즈까지 지원하며 효율을 높였다 [D2-p17].\n\n가장 최신인 YOLOv26의 핵심은 'NMS Free'다 [D2-p18]. 객체 탐지 모델은 보통 서로 겹치는 상자를 아주 많이 내놓아, 대표 상자만 남기는 고전 후처리 NMS를 거치는데 이는 상자 개수 N에 대해 O(N^2)의 비용이 든다 [D2-p19]. YOLOv26은 학습 때는 하나의 정답에 여러 예측을 붙이고 추론 때는 하나만 대응시키는 one-to-one 헤드로 NMS 자체를 없애고, NPU·DSP 효율에 해가 되는 DFL을 제거하며, 작은 물체를 잘 잡는 라벨 할당 같은 개선된 학습 기법을 더했다 [D2-p20]. NMS가 없다는 것은 추론 파이프라인이 단순해지고 배포가 쉬워진다는 뜻이다 [D2-p18][D2-p19].", "key_points": ["객체 탐지는 종류 분류와 위치 회귀를 가중합해 함께 학습하는 과제다 [D2-p5][D2-p7].", "YOLO는 이미지를 격자로 나눠 한 번에 탐지하며, 실용주의적으로 버전을 발전시켜 왔다 [D2-p8][D2-p12].", "YOLOv26의 핵심은 one-to-one 헤드로 O(N^2) 후처리 NMS를 없앤 'NMS Free'다 [D2-p18][D2-p19][D2-p20]."]}, {"id": "ch11", "title": "YOLO를 넘어 프레임워크로: Ultralytics와 실전 채널 프루닝", "summary": "YOLO를 감싼 Ultralytics 생태계와 코드 구조를 이해하고, 1일차의 채널 프루닝을 TorchPruning으로 실제 적용해 본다.", "pages": [21, 52], "body": "YOLOv26은 단순한 모델이 아니라 하나의 프레임워크로 강조된다 [D2-p21]. Ultralytics는 데이터셋 준비(Roboflow 등) → 학습(로거 연동) → 배포로 이어지는 통합 생태계를 제공하며, Train·Val·Predict·Export·Track·Benchmark의 여섯 모드로 개발 수명주기를 하나의 인터페이스로 다룬다 [D2-p22][D2-p23]. 특히 Export 모드는 PyTorch·ONNX·TensorRT·CoreML·TFLite 등 수많은 배포 형식을 지원해, 1일차에서 강조한 '타겟 하드웨어에 맞춘 배포'를 손쉽게 만든다 [D2-p24]. 지원 작업도 분류·탐지·분할·추적·포즈·OBB로 넓고, 표준 데이터셋과 객체 계수·속도 추정 같은 실전 솔루션, Neural Magic 같은 런타임 연동까지 갖췄다 [D2-p25][D2-p29][D2-p30][D2-p32].\n\n경량화를 하려면 이 프레임워크의 어디에 손대야 하는지를 알아야 한다 [D2-p33]. 코드 저장소의 models 폴더에는 SAM·NAS·RT-DETR·YOLO 등이 있고, YOLO 클래스는 공통 Model 클래스를 상속한다 [D2-p33][D2-p34]. 중요한 것은 중첩 구조다 — 가장 바깥의 엔진 Model이 학습·검증·내보내기를 감싸고, 그 안의 DetectionModel이 전후처리를 담당하며, 가장 안쪽의 순차 신경망이 실제 모델이다 [D2-p36][D2-p37]. 즉 경량화의 대상은 model.model.model 경로 안의 순차 신경망이며, 하위 모듈을 setattr로 바꿔 끼우면 압축된 모델을 얻지만 기본 저장/불러오기가 그대로 안 될 수 있어 변형 정보를 따로 관리해야 한다 [D2-p40].\n\n실전 압축 기법으로는 1일차에서 배운 채널 프루닝이 YOLOv26에 비교적 쉽게 적용된다 [D2-p42]. 이를 돕는 도구가 TorchPruning으로, 파이토치 모델의 계층 간 의존 관계를 담은 의존성 그래프를 만들어 함께 잘려야 하는 채널들을 그룹으로 묶는다 [D2-p42][D2-p43][D2-p44]. 기본·잔차·연결·축소 의존성 등을 그래프로 표현해, 한쪽 채널만 지워 텐서 크기가 어긋나는 사고를 막고 안전하게 자른다 [D2-p44]. 코드는 모델을 불러와 프루닝하기 좋은 형태로 바꾸고 기준값을 측정한 뒤 [D2-p45], 한 번에 크게 자르지 않고 여러 번 반복하며 매 반복에서 그룹 노름이 작은 채널을 잘라내고(pruning) 다시 파인튜닝으로 정확도를 회복하는 구조다 [D2-p47][D2-p48][D2-p49]. 이 흐름은 1일차 가중치 프루닝의 '자르고 재학습' 반복과 정확히 같은 원리다 [D1-p32][D2-p48]. 실습은 데이터셋 준비 → 모델 로드 → 채널 프루닝 → 재로드·평가 → 내보내기 순으로 진행되며, 설치·실행 명령까지 구체적으로 안내된다 [D2-p50][D2-p51][D2-p52].", "key_points": ["Ultralytics는 데이터→학습→배포를 통합한 프레임워크로, Export가 여러 배포 형식을 지원한다 [D2-p22][D2-p24].", "경량화 대상은 엔진 Model 안쪽의 순차 신경망(model.model.model)이다 [D2-p36][D2-p40].", "TorchPruning은 의존성 그래프로 함께 잘릴 채널을 그룹화해 안전하게 채널 프루닝한다 [D2-p44].", "실전 프루닝도 '조금 자르고 파인튜닝으로 회복'을 반복하는 1일차 원리를 따른다 [D2-p48]."]}, {"id": "ch12", "title": "파운데이션 모델: 왜 무겁고, 왜 잘 되는가", "summary": "파운데이션 모델의 정의와 트랜스포머 기반을 이해하고, '왜 거대한데도 일반화되는가'라는 학습 이론의 물음까지 파고든다.", "pages": [53, 84], "body": "이제 강의의 중심이 파운데이션 모델로 옮겨간다 [D2-p53]. 파운데이션 모델은 대규모 데이터로 사전학습한 하나의 큰 모델로, 재학습 없이 바로 쓰는 제로샷이나 일부 파라미터만 조정하는 효율적 파인튜닝으로 여러 하위 작업에 두루 활용된다 [D2-p54]. 여러 도메인·여러 형태의 데이터·여러 작업을 하나의 모델이 아우르는 것이 핵심이며 [D2-p55][D2-p61], 보통 트랜스포머를 기반으로 만들어진다 [D2-p56]. 트랜스포머는 CNN·RNN보다 구조적 편향이 작으면서 MLP보다 파라미터를 효율적으로 쓰고, 모든 토큰 사이의 어텐션 관계를 고려해 데이터가 커질수록 성능이 효과적으로 오른다 [D2-p56][D2-p58]. 단점을 굳이 꼽으면 모델이 무겁다는 점인데, 바로 이 무거움이 이 강의 전체가 다루는 경량화의 이유다 [D2-p59].\n\n대표 사례들이 파운데이션 모델의 범용성을 보여준다 [D2-p60]. 비전 분야의 Segment Anything(SAM)은 미리 정해진 종류에 얽매이지 않고 임의의 물체를 분할하며, 텍스트로 지시하면 해당 물체만 골라 분할하기도 한다 [D2-p62][D2-p64][D2-p65]. 시각-언어 모델은 시각 질의응답(VQA) 같은 벤치마크에서 강력한 성능을 보이는데, 제로샷 조건에서 최신 LLM이 사람(약 81%)에 근접한 78%를 기록한 것은 놀라운 결과다 [D2-p66][D2-p70]. 강연자는 그다음 무엇을 고민해야 하는가라는 물음과 함께, 언어만 잘하는 것을 넘어 물리 법칙과 상호작용까지 담은 월드 모델을 다음 단계로 제시한다 [D2-p70][D2-p71][D2-p72].\n\n여기서 강의는 잠시 이론으로 내려간다 [D2-p73][D2-p74]. 머신러닝은 하나의 분포 D에서 나온 학습 데이터로 배워 같은 분포의 테스트 데이터를 맞히는 것이고, 학습 이론은 '학습 데이터로 배운 모델이 실제 데이터에서 얼마나 정확할까'라는 일반화 오차를 다룬다 [D2-p75][D2-p76]. 그런데 VQA 모델이 이미지를 잘 이해하는 것처럼 보여도, 사실은 질문 유형별로 흔한 답을 학습된 분포에서 골라 찍는 경우가 많다(언어 사전편향) [D2-p77][D2-p78]. 즉 머신러닝은 훌륭하지만 학습 범위를 벗어난 입력은 의도대로 예측하지 못하며, 맑은 날 데이터로만 배운 자율주행 모델이 눈길에서 무너지는 식이다 [D2-p79]. 그 처방이 '다양한 데이터를 끝까지 확보하자'이고, 그 극단이 바로 파운데이션 모델이다 [D2-p79][D2-p80].\n\n그러나 파운데이션 모델은 기존 학습 이론을 흔든다 [D2-p81]. 전통적 상식은 '작은 모델일수록 일반화가 잘 된다'였는데, 거대한 파운데이션 모델이 오히려 일반화가 잘 되는 현상은 새로운 이론을 요구한다 [D2-p81]. 데이터가 작을 때는 CNN/RNN이, 클 때는 처음부터 학습한 트랜스포머가 유리하지만, 정확도만 보면 파운데이션 모델이 모든 규모에서 가장 좋아 그 위를 폭넓게 덮는다 [D2-p82]. 그래서 강연자는 새 아이디어가 좁은 한 데이터셋에서 이긴 것으로는 부족하고 여러 데이터·과제에 두루 통할 때 비로소 흥미롭다고 강조하며, 결론적으로 트랜스포머·CNN 대비 최소한 같은 커버리지를 유지하면서 정확도를 더 높이거나, 정확도를 유지하며 효율을 더 높인 아키텍처가 필요하다고 정리한다 [D2-p83][D2-p84].", "key_points": ["파운데이션 모델은 대규모 사전학습된 트랜스포머 기반 모델로, 여러 도메인·형태·작업을 아우르되 무겁다는 것이 단점이자 경량화의 이유다 [D2-p54][D2-p56][D2-p59].", "VQA에서 높은 점수는 이미지 이해가 아니라 질문 분포에 기댄 언어 사전편향일 수 있다 [D2-p78].", "머신러닝의 한계는 학습 분포 밖 입력이며, 그 처방을 극단까지 민 것이 파운데이션 모델이다 [D2-p79][D2-p80].", "거대한 모델이 왜 일반화되는지는 새 학습 이론이 필요하며, 넓은 커버리지에서 정확도·효율을 높이는 것이 연구 목표다 [D2-p81][D2-p84]."]}, {"id": "ch13", "title": "파운데이션 모델을 가볍게: LLM·VLM 추론 압축", "summary": "추측 디코딩과 KV 캐시, 그 양자화, 그리고 시각-언어 모델의 토큰 프루닝까지 무거운 생성 모델의 추론을 줄이는 기법을 본다.", "pages": [85, 108], "body": "무거운 파운데이션 모델을 실제로 가볍게 하는 첫 무대는 LLM의 생성 속도다 [D2-p85]. 추측 디코딩(speculative decoding)은 작고 가벼운 초안 모델이 다음 토큰들을 빠르게 미리 뽑으면, 크고 정확한 목표 모델이 그것들을 한꺼번에 병렬로 검증하는 방식이다 [D2-p86]. 목표 모델은 확률이 어긋나는 토큰이 나오는 순간 거부해 거기서 초안을 끊으며 [D2-p87], 이 받아들이고 거부하는 규칙 덕분에 최종적으로 뽑힌 토큰이 정확히 목표 분포를 따르도록 수학적으로 보장된다 — 속도는 높이되 품질은 목표 모델 그대로다 [D2-p88][D2-p89].\n\n다음은 반복 계산 문제다 [D2-p90]. LLM은 토큰을 하나씩 순차 생성하는 디코더라 과거 토큰이 미래에 영향받지 않는데, 그대로 두면 새 토큰마다 과거 토큰의 Key·Value를 똑같이 다시 계산하는 낭비가 생긴다 [D2-p91][D2-p92]. KV 캐시는 이미 처리한 과거 토큰의 K·V를 저장해 두고 재활용해, 매 단계 현재 토큰만 새로 계산하게 만들어 이 반복을 없앤다 [D2-p93]. 그러나 문맥이 길어질수록 캐시가 커져, 이제는 계산량보다 큰 캐시를 읽고 쓰는 입출력 시간이 추론 속도를 좌우하는 새로운 병목이 된다 [D2-p94].\n\n그래서 KV 캐시를 양자화해 메모리를 줄인다 [D2-p95]. 16비트 값을 몇 개의 구간으로 나눠 낮은 비트 정수로 바꾸면 저장 크기가 크게 준다 [D2-p95]. 문제는 값이 크게 튀는 이상치(outlier)로, 하나의 큰 값 때문에 구간 범위가 늘어나 나머지 작은 값들이 모두 같은 구간으로 뭉개져 구분이 사라진다 [D2-p96]. 이상치가 특정 열(채널)에 패턴처럼 몰리는 성질을 이용해, 행이 아니라 열 단위로 스케일과 오프셋을 따로 적용하는 KIVI가 이 문제를 푼다 [D2-p97].\n\n시각-언어 모델(VLM)에도 경량화가 필요하다 [D2-p98]. 대표 모델 CLIP은 이미지와 텍스트를 같은 공간에 정렬해 올바른 쌍은 끌어당기고 틀린 쌍은 밀어내는 대조 학습으로, 클래스 이름을 문장으로 만들어 재학습 없이 이미지를 분류하는 제로샷이 가능하다 [D2-p98][D2-p99]. LLaVA는 언어모델은 그대로 두고 이미지를 '시각 토큰'으로 바꿔 끼워 넣는 방식으로 멀티모달을 구현한다 [D2-p100]. VLM 경량화는 공통(추측 디코딩)·구조(채널 프루닝·저랭크)·값(양자화·가중치 프루닝)·데이터(토큰 프루닝)로 정리되는데 [D2-p101], 특히 토큰 프루닝은 토큰들을 유사도로 연결한 그래프에서 정보량을 계산해 덜 중요한 토큰을 제거한다 [D2-p102]. 고성능 VLM은 같은 이미지를 여러 해상도로 처리하고 해상도마다 토큰 중요도가 달라, 해상도별로 다른 비율로 자르고 한 해상도에서 잘린 정보를 다른 해상도 토큰을 자르는 데 활용하는 MR-Pruner가 여러 프루닝 비율에서 기존 방법을 앞서며 처리량 배속을 얻는다 [D2-p103][D2-p104][D2-p105][D2-p106]. 이 발상은 프레임 간 유사성이 큰 영상, 오래된 토큰을 덜어낼 수 있는 시계열 파운데이션 모델로도 확장된다 [D2-p107][D2-p108].", "key_points": ["추측 디코딩은 작은 초안 모델로 여러 토큰을 미리 뽑고 큰 모델이 한꺼번에 검증해 속도를 높이되 품질은 목표 모델 그대로 보장한다 [D2-p86][D2-p88].", "KV 캐시는 과거 토큰의 K·V 재계산을 없애지만, 캐시가 커지면 I/O가 새 병목이 된다 [D2-p93][D2-p94].", "KV 캐시 양자화의 최대 걸림돌은 이상치이며, 열 단위로 처리하는 KIVI가 이를 해결한다 [D2-p96][D2-p97].", "VLM 경량화의 데이터 기반 기법인 토큰 프루닝은 해상도별로 다르게 잘라야 하며 MR-Pruner가 처리량을 크게 높인다 [D2-p103][D2-p105]."]}, {"id": "ch14", "title": "하나의 모델로 여러 일을: 멀티태스크 학습", "summary": "여러 과제를 한 모델로 처리하는 구조와 학습법을 배우고, 부정적 전이를 다루는 기법과 실제 멀티태스크 YOLO까지 본다.", "pages": [111, 177], "body": "경량화의 또 다른 길은 하나의 모델로 여러 일을 하게 만드는 것이다 [D2-p111]. 한 과제는 학습/테스트 데이터셋과 목적 손실함수로 정의되는데, 보통의 모델은 단일 과제 하나만을 위해 설계된다 [D2-p112]. 여러 과제를 다루려면 공통 몸통에 여러 출력부(head)를 붙이거나 [D2-p113][D2-p114], 과제별 네트워크를 두되 가중치가 비슷해지도록 묶거나 [D2-p115], 제어 변수 z를 넣어 하나의 head로 여러 과제를 수행하게 할 수 있다 [D2-p116]. 동기는 두 가지다 — 몸통을 공유해 계산·메모리를 아끼는 효율성, 그리고 과제 A의 지식이 과제 B에 도움이 되는 전이다 [D2-p117][D2-p118][D2-p119]. 다만 정확도 이득이 항상 보장되지는 않아, 과제를 무작정 많이 묶으면 오히려 성능이 떨어질 수 있다 [D2-p120].\n\n제어 변수 z를 주입하는 방법으로는 입력에 이어붙이는 조건화, 편향으로 더하는 조건화, 배율로 곱하는 조건화가 있는데, 이어붙이기와 조건 편향은 수학적으로 같음이 밝혀진다 [D2-p121][D2-p122][D2-p123][D2-p124]. 구조로는 공유 백본에 과제별 분류기만 붙이는 형태부터 [D2-p125], 여러 해상도·과제를 한 백본으로 처리하는 UberNet, 두 네트워크 특징을 학습 계수로 섞는 크로스-스티치, 과제별 어텐션, 공유 어텐션 트랜스포머(MulT), 이종 과제를 하나로 처리하는 통합 트랜스포머(UniT)까지 다양하다 [D2-p126][D2-p127][D2-p128][D2-p129][D2-p131][D2-p132]. 강연자는 이런 구조 설계가 아직 과학보다 직관에 의존하는 '기술(art)'에 가깝다고 솔직하게 말한다 [D2-p133].\n\n학습 방법도 문제다 [D2-p134]. 한 입력에 모든 과제의 정답이 다 붙어 있으면 각 손실을 가중합해 학습하면 되지만, 그 가중치는 하이퍼파라미터라 탐색으로 튜닝해야 한다 [D2-p136][D2-p137]. 현실에서는 과제마다 데이터셋이 따로여서, 순차적으로 이어 학습하면 앞 과제를 잊는 파국적 망각이 생긴다 [D2-p138][D2-p139][D2-p140]. 그래서 한 배치 안에 여러 과제 데이터를 섞어 가중 손실로 함께 학습하고, 어떤 과제를 더 뽑을지 중요도 샘플링이나 강화학습으로 조절한다 [D2-p141][D2-p142][D2-p143].\n\n멀티태스크의 핵심 위험은 한 과제가 다른 과제를 해치는 부정적 전이다 [D2-p144]. 이는 두 과제의 기울기가 반대 방향(코사인 유사도 음수)을 가리킬 때 생긴다 [D2-p146]. 소프트 파라미터 공유는 과제별 가중치가 너무 달라지지 않도록 벌점을 주고 [D2-p145], 그래디언트 서저리(PCGrad)는 충돌하는 두 기울기를 서로의 법선 평면에 투영해 충돌 성분만 제거한다 [D2-p146][D2-p147][D2-p148]. 그러나 기울기 조작만으로는 충돌이 충분히 해소되지 않는다는 관찰에서, 충돌이 심한 공유 층 자체를 찾아 과제 전용으로 바꾸는 Recon이 제안되며 여러 기법 위에 얹어 성능을 높인다 [D2-p149][D2-p150][D2-p151][D2-p152][D2-p153][D2-p154]. 지식 증류도 활용되는데, 각 과제 전문가 모델을 교사로 삼아 멀티태스크 모델의 해당 head를 가르치거나, 단일 작업 모델과 멀티태스크 모델을 함께 학습하며 특징을 정렬하는 온라인 증류가 종합 성능에서 앞선다 [D2-p155][D2-p156][D2-p158][D2-p159].\n\n실전으로는 YOLOv8 저장소의 여러 단일 작업을 결합할 수 있다 [D2-p160]. A-YOLOM은 공유 백본 하나에서 분할 넥과 탐지 넥으로 갈라져 마스크와 탐지를 함께 출력하며, 적은 파라미터로 두 작업을 처리하면서도 기존 멀티태스크 모델보다 빠른 추론 속도를 낸다 [D2-p161][D2-p162][D2-p164][D2-p165][D2-p166]. 마지막으로 추론 효율은 서브네트워크 공유 방식에 달렸는데, 출력부 크기가 비슷하면 한 번에 처리하는 게 합리적이지만 크게 다르면 작은 작업은 따로 처리하는 편이 빠르다 [D2-p169][D2-p170]. 각 작업이 자신의 계산 비용에 따라 결과를 순차적으로 내보내는 스트리밍 방식도 제안되나, 이를 제대로 지원하는 구현은 아직 미개척 영역으로 남아 있다 [D2-p171][D2-p172][D2-p173]. 결국 어떤 과제들을 함께 묶어야 이득인지를 찾는 것이 열린 핵심 과제이며, 백본이 커지면 함께 학습의 이득이 커진다는 관찰이 이를 뒷받침한다 [D2-p174][D2-p176].", "key_points": ["멀티태스크 학습은 공유 몸통에 여러 head를 붙이거나 제어 변수 z로 여러 과제를 처리하며, 효율과 전이가 동기다 [D2-p113][D2-p116][D2-p117].", "과제별 데이터셋이 따로일 때 순차 학습은 파국적 망각을 부르므로 배치에 섞어 학습한다 [D2-p140][D2-p141].", "부정적 전이는 기울기 충돌에서 오며, PCGrad는 충돌 성분을 잘라내고 Recon은 충돌 층을 과제 전용으로 재구성한다 [D2-p146][D2-p147][D2-p150].", "A-YOLOM은 공유 백본으로 탐지와 분할을 함께 처리하며 기존 멀티태스크 모델보다 빠르다 [D2-p162][D2-p164]."]}, {"id": "ch15", "title": "기기에서 배우다: 온디바이스 학습, 프라이버시, 메모리", "summary": "추론을 넘어 학습을 기기로 가져오는 마지막 여정 — 연합학습의 프라이버시 함정과 학습 메모리 병목, 그리고 그것을 뚫는 TinyTL·Sparse-BP·QAS를 본다.", "pages": [178, 245], "body": "세미나의 마지막 주제는 추론을 넘어 학습 자체를 기기로 가져오는 것이다 [D2-p178]. 전이 학습은 한 과제에서 배운 지식을 관련 과제에 재사용하는 것이고, 온디바이스 학습은 이 전이 학습을 클라우드가 아니라 사용자의 기기에서 수행하는 것이다 [D2-p179][D2-p180]. 두 가지 장점이 있다 — 기기 센서에 새로 모이는 데이터에 맞춰 계속 적응하는 커스터마이징, 그리고 데이터가 기기를 떠나지 않는 프라이버시다 [D2-p180][D2-p181]. 연합학습은 이를 여럿으로 확장해, 각 기기의 원본 데이터는 그대로 두고 그래디언트나 가중치만 공유한다 [D2-p182]. FedAvg는 각 기기가 로컬 학습을 N번 반복해 모델을 서버로 보내면 서버가 평균 내어 되돌려보내는 한 라운드를 반복한다 [D2-p183][D2-p184][D2-p185][D2-p186].\n\n그런데 데이터를 보내지 않으면 정말 안전한가 [D2-p187]. 강의는 이 통념을 정면으로 뒤집는다 [D2-p189]. 그래디언트에는 학습 데이터의 정보가 담겨 있고 [D2-p189][D2-p190], 실제로 'Deep Leakage from Gradients'는 공격자가 무작위 가짜 입력의 그래디언트를 진짜 그래디언트와 일치하도록 맞춰가며 원본 데이터를 복원한다 [D2-p194][D2-p195]. 반복이 진행될수록 노이즈였던 이미지가 실제 정답과 거의 같아지고, 이미지뿐 아니라 BERT 같은 언어모델에서도 원문 문장이 복원된다 [D2-p196][D2-p197][D2-p198]. 방어로 그래디언트에 노이즈를 더하거나 FP16으로 낮추는 방법은 큰 정확도 손실을 감수하지 않는 한 유출을 막지 못하지만 [D2-p199][D2-p200], 그래디언트 압축(DGC)은 큰 값만 전송하고 작은 값은 로컬에 쌓아두는 방식으로 정확도를 유지하면서 유출을 효과적으로 막고 통신량까지 줄인다 [D2-p201][D2-p202].\n\n프라이버시 다음의 벽은 메모리다 [D2-p203]. 엣지 기기의 메모리는 심층 신경망을 담기에 너무 작아 가중치뿐 아니라 활성값까지 줄여야 하며 [D2-p203], MobileNetV2도 추론은 작지만 배치 8 학습은 452MB를 써 라즈베리파이의 DRAM을 이미 넘어선다 [D2-p204]. 이유는 역전파에서 가중치 기울기를 구하려면 순전파 때의 중간 활성값을 붙들고 있어야 하기 때문이고, 활성값은 배치 크기에 비례해 커진다 [D2-p205]. 결정적으로 CNN 학습의 진짜 병목은 파라미터가 아니라 활성값이어서, 파라미터·연산량만 줄인 MobileNet도 이 병목은 개선하지 못한다 [D2-p207]. 전체 미세조정은 정확하나 비효율적이고 마지막 층만 조정하면 효율적이나 정확도가 크게 떨어지며, 배치정규화 층과 마지막 층을 함께 조정하는 BN+Last도 파라미터는 줄지만 메모리 절감은 크지 않다 [D2-p208][D2-p209][D2-p210].\n\n핵심 통찰은 편향(bias)만 업데이트하면 활성값을 저장할 필요가 없다는 것이다 [D2-p211]. 가중치 기울기는 입력 활성값이 필요하지만 편향 기울기는 출력 기울기만으로 구해지기 때문이다 [D2-p211][D2-p222]. TinyTL은 여기서 출발해, 가중치를 얼리고 편향만 학습하되(메모리 약 12배 절감이나 정확도 하락) [D2-p212], 잃은 표현력을 가벼운 잔차 모듈로 메운다 [D2-p213]. 이때 잔차 경로의 해상도를 낮추고 채널을 부풀리는 역병목을 피해 활성값을 원래의 약 4% 수준으로 유지하는 것이 관건이다 [D2-p214][D2-p215]. 그 결과 단 5MB 추가로 편향만 학습할 때보다 정확도를 11.6% 끌어올리고, 정확도 손실 없이 최대 6.5배 학습 메모리를 절감하며, 그룹 정규화로 배치 크기 1 학습을 지원해 메모리를 16MB(L3 캐시) 수준까지 낮춘다 [D2-p216][D2-p217][D2-p218][D2-p219].\n\nTinyTL이 '무엇을 학습하나'를 줄였다면, 희소 역전파는 '어디까지 역전파하나'를 줄인다 [D2-p220]. 모든 층이 똑같이 중요하지 않고 한 층 안에서도 채널마다 중요도가 다르며 초기 층은 새 과제 적응 기여가 작다는 관찰에서, 중요한 층·채널에만 역전파하고 앞쪽 층으로의 전파는 끊는다 [D2-p223][D2-p224][D2-p225]. 이 세 희소화를 합치면 활성값의 일부만 저장·계산해 저장량과 연산이 약 4배 줄고 [D2-p226], 어느 층을 학습할지는 기여도 분석과 진화 탐색으로 메모리 제약 안에서 정확도 기여를 최대화하도록 고른다 [D2-p229][D2-p230]. 결과적으로 희소 역전파는 비전·언어 과제 모두에서 전체 역전파에 필적하는 정확도를 4.5~7.5배 작은 추가 메모리로 얻고, Llama2-7B를 엣지 GPU에서 미세조정할 때 LoRA와 같은 정확도를 내며 학습을 2배 빠르게 한다 [D2-p231][D2-p232][D2-p234][D2-p236].\n\n마지막은 학습 자체를 양자화하는 것이다 [D2-p237]. QAT의 가짜 양자화는 중간 텐서가 여전히 FP32라 학습 메모리를 못 줄이지만, 모든 텐서를 int8/int32로 저장하는 진짜 양자화는 메모리를 실제로 줄인다 [D2-p238][D2-p239]. 문제는 혼합 정밀도와 배치정규화 부재로 학습이 어려워지는데, 근본 원인은 가중치와 기울기의 스케일이 어긋나는 데 있다 [D2-p240][D2-p241]. QAS(양자화 인식 스케일링)는 이 어긋남이 정확히 스케일 계수의 제곱만큼임을 유도해 기울기에 그 역수를 곱해 되돌리고, 그 결과 int8 학습의 손실이 fp32 수준으로 안정적으로 수렴하며 정확도도 fp32(86.0%)를 오히려 살짝 넘어선 86.9%를 낸다 [D2-p242][D2-p243][D2-p244][D2-p245]. 이렇게 추론을 넘어 학습까지 기기 안으로 들여오는 것이 이 세미나가 그린 경량화의 마지막 지평이다 [D2-p246].", "key_points": ["연합학습은 데이터를 안 보내도 그래디언트로 원본이 복원되는 Deep Leakage 위험이 있고, DGC가 정확도를 지키며 이를 막는다 [D2-p190][D2-p195][D2-p201].", "학습 메모리의 진짜 병목은 파라미터가 아니라 저장해야 하는 중간 활성값이다 [D2-p205][D2-p207].", "TinyTL은 편향만 학습 + 경량 잔차로 정확도 손실 없이 최대 6.5배 학습 메모리를 절감한다 [D2-p216][D2-p218].", "희소 역전파는 중요한 층·채널만 역전파해 전체 역전파에 필적하고, QAS는 스케일 보정으로 int8 학습을 fp32 수준으로 끌어올린다 [D2-p231][D2-p245]."]}], "epilogue": "두 날을 관통하는 메시지는 분명하다 — 경량화는 어느 한 기법의 문제가 아니라, 목표에서 역산해 여러 기법을 겹치고 런타임·하드웨어까지 맞추는 시스템 설계 문제다 [D1-p11][D1-p147]. 그래서 실무의 첫걸음은 모델이 아니라 타겟 디바이스와 런타임, 그리고 요구 정확도·속도·메모리·크기를 먼저 못박는 일이다 [D1-p13][D1-p116]. 1일차의 도구 상자(프루닝·분해·양자화·경량 구조·지식 증류)와 그것을 자동으로 엮는 탐색은 여전히 유효한 기본기이고 [D1-p73][D1-p138], 2일차가 보여주듯 무대는 이미 파운데이션 모델과 온디바이스 학습으로 옮겨가, KV 캐시·토큰 프루닝처럼 추론을 줄이는 기법과 TinyTL·Sparse-BP·QAS처럼 '학습 자체'를 기기에 담는 기법이 새 전선이 되었다 [D2-p94][D2-p217][D2-p245]. 정리하면, 좋은 경량화는 세 가지를 함께 본다 — 무엇을 줄일지(기법), 어디서 돌릴지(런타임·하드웨어), 그리고 무엇을 지킬지(정확도·커버리지) [D1-p38][D2-p84]. 이 셋을 따로가 아니라 한 문제로 놓고 풀 때, 무거운 AI가 비로소 손안의 기기에서 살아 움직인다. (배경지식) 새로운 아키텍처나 기법을 제안할 때는 좁은 한 과제의 승리보다 여러 데이터·과제에 두루 통하는 개선인지를 스스로 물어보는 태도가 이 강의 전체의 밑바탕에 깔려 있다."};
</script>
<script>
(function(){
  var D = window.NOTE_DATA;

  // ---- 간단 인라인 렌더: HTML 이스케이프 -> **굵게** -> 인용 배지 -> 마커 ----
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function inline(s){
    s = esc(s);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // 인용 태그 [D{d}-p{n}] -> 슬라이드 해설 딥링크 배지 (day는 태그가 직접 담음)
    s = s.replace(/\[D(\d+)-p(\d+)\]/g,
      '<a class="cite" href="index.html#d$1p$2" title="슬라이드 D$1-p$2로 이동">D$1&middot;p$2</a>');
    // (배경지식)/(모델 지식) 회색 배지
    s = s.replace(/\((배경지식|모델 지식)\)/g, '<span class="mk">$1</span>');
    return s;
  }
  // ---- 문단/목록 마크다운 ----
  function markdown(body){
    return body.split(/\n\n+/).map(function(block){
      var lines = block.split('\n');
      var allItems = lines.every(function(l){return l.trim().indexOf('- ')===0;});
      if(allItems && lines.length){
        return '<ul>'+lines.map(function(l){
          return '<li>'+inline(l.trim().slice(2))+'</li>';
        }).join('')+'</ul>';
      }
      return '<p>'+inline(block.replace(/\n/g,' '))+'</p>';
    }).join('');
  }
  // ---- 챕터 day 추론: 본문 인용 태그의 다수결 ----
  function chapterDay(ch){
    var m = (ch.body||'').match(/\[D(\d+)-p\d+\]/g) || [];
    var cnt = {};
    m.forEach(function(t){ var d = t.match(/\[D(\d+)-/)[1]; cnt[d]=(cnt[d]||0)+1; });
    var best='1', bn=-1;
    Object.keys(cnt).forEach(function(d){ if(cnt[d]>bn){bn=cnt[d];best=d;} });
    return best;
  }

  // ---- 히어로 ----
  var titleParts = D.title.split(/\s*—\s*/);
  var mainT = titleParts[0];
  var subT = titleParts.slice(1).join(' — ');
  document.getElementById('heroTitle').innerHTML =
    esc(mainT) + (subT ? '<span class="sub">'+esc(subT)+'</span>' : '');
  document.getElementById('heroMeta').innerHTML =
    '<span class="chip">강사 <b>이종률 교수</b></span>' +
    '<span class="chip">읽기 시간 <b>'+esc(D.reading_time)+'</b></span>' +
    '<span class="chip">본편 <b>슬라이드 467장 · '+D.chapters.length+'개 장</b></span>';

  // 각 챕터 day 미리 계산
  D.chapters.forEach(function(ch){ ch._day = chapterDay(ch); });

  // ---- 본문 조립 ----
  var html = '';

  // 프롤로그
  html += '<section class="block" id="prologue">'
       +  '<div class="essay prologue">'
       +  '<span class="etag">PROLOGUE · 들어가며</span>'
       +  markdown(D.prologue)
       +  '</div></section>';

  // 장 목차 (day 구분 헤더 포함)
  html += '<section class="toc-wrap" id="toc">'
       +  '<div class="kicker"><span class="no">목차 /</span> 이 노트의 흐름</div>'
       +  '<h2 class="title">열다섯 개의 장으로 다시 엮은 학습 여정</h2>'
       +  '<div class="toc-grid">';
  var lastDay = null;
  D.chapters.forEach(function(ch, i){
    var no = String(i+1).padStart(2,'0');
    if(ch._day !== lastDay){
      html += '<div class="toc-daysep">'
           +  (ch._day==='1' ? 'DAY 1 — 모델 경량화 이론과 아키텍처 (221p)'
                             : 'DAY 2 — 응용: 객체 탐지·퀀타이제이션·멀티태스크 (246p)')
           +  '</div>';
      lastDay = ch._day;
    }
    html += '<a class="toc-item" href="#'+ch.id+'">'
         +  '<div class="tc-no">'+no+'</div>'
         +  '<div><div class="tc-title">'+esc(ch.title)
         +  '<span class="day-badge d'+ch._day+'">D'+ch._day+'</span></div>'
         +  '<div class="tc-sum">'+esc(ch.summary)+'</div></div>'
         +  '<div class="tc-pg">p'+ch.pages[0]+'–'+ch.pages[1]+'</div>'
         +  '</a>';
  });
  html += '</div></section>';

  // 각 장
  D.chapters.forEach(function(ch, i){
    var no = String(i+1).padStart(2,'0');
    html += '<section class="block chapter" id="'+ch.id+'">'
         +  '<div class="kicker"><span class="no">'+no+' /</span> DAY '+ch._day+' · 슬라이드 '+ch.pages[0]+'–'+ch.pages[1]+'</div>'
         +  '<h2 class="title">'+esc(ch.title)+'<span class="day-badge d'+ch._day+'">DAY '+ch._day+'</span></h2>'
         +  '<p class="summary">'+esc(ch.summary)+'</p>'
         +  '<div class="body">'+markdown(ch.body)+'</div>';
    if(ch.key_points && ch.key_points.length){
      html += '<div class="keypts"><div class="kt">이 장의 핵심</div><ul>'
           +  ch.key_points.map(function(k){return '<li>'+inline(k)+'</li>';}).join('')
           +  '</ul></div>';
    }
    html += '<a class="toslides" href="index.html#d'+ch._day+'p'+ch.pages[0]+'">'
         +  '이 구간 슬라이드로 보기 <span class="arw">→</span></a>';
    html += '</section>';
  });

  // 에필로그
  html += '<section class="block" id="epilogue">'
       +  '<div class="essay epilogue">'
       +  '<span class="etag">EPILOGUE · 나가며</span>'
       +  markdown(D.epilogue)
       +  '</div></section>';

  document.getElementById('content').innerHTML = html;

  // ---- 사이드 진행 네비 구성 ----
  var navItems = [
    {id:'prologue', lb:'프롤로그'},
    {id:'toc', lb:'목차'}
  ];
  D.chapters.forEach(function(ch,i){
    navItems.push({id:ch.id, lb:String(i+1)+'장'});
  });
  navItems.push({id:'epilogue', lb:'에필로그'});
  var sidenav = document.getElementById('sidenav');
  sidenav.innerHTML = navItems.map(function(n){
    return '<a href="#'+n.id+'"><span class="dot"></span><span class="lb">'+n.lb+'</span></a>';
  }).join('');

  // ---- 스크롤: 진행바 + 활성 점 ----
  var secs = navItems.map(function(n){return document.getElementById(n.id);});
  var links = [].slice.call(sidenav.querySelectorAll('a'));
  window.addEventListener('scroll', function(){
    var h = document.documentElement;
    document.getElementById('progress').style.width =
      (h.scrollTop/(h.scrollHeight-h.clientHeight)*100)+'%';
    var cur = 0;
    secs.forEach(function(s,i){
      if(s && s.getBoundingClientRect().top < window.innerHeight*0.4) cur = i;
    });
    links.forEach(function(a,i){a.classList.toggle('on', i===cur);});
    // 활성 사이드 링크가 보이도록 스크롤(장이 많아 넘칠 때)
    var onLink = links[cur];
    if(onLink && onLink.scrollIntoViewIfNeeded){ onLink.scrollIntoViewIfNeeded(); }
  }, {passive:true});
})();
</script>
</body>
</html>
